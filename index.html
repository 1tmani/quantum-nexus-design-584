<!DOCTYPE html><html><head><meta charset='UTF-8'><title>QUANTUM NEXUS | NEURAL_DESIGN</title>
<link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Michroma&display=swap' rel='stylesheet'>
<style>:root{--p:#00f2ff;--bg:#000;} body{background:#000;color:#fff;font-family:'Michroma';overflow:hidden;} 
canvas{position:fixed;inset:0;z-index:1; opacity:0.4;} .hud{position:fixed;top:40px;left:40px;z-index:100;border-left:2px solid var(--p);padding-left:20px;letter-spacing:5px;font-size:10px;}
</style></head><body><div class='hud'>NODE: QUANTUM_NEXUS_V2<br>IDENTITY: NEURAL_DESIGN_SYSTEM<br>STATUS: PURE_CRYSTAL_LATTICE</div><canvas id='c'></canvas>
<script>const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');let w,h,t=0;function res(){{w=canvas.width=innerWidth;h=canvas.height=innerHeight;}}res();
function draw(){{t+=0.01;ctx.fillStyle='rgba(0,0,0,0.15)';ctx.fillRect(0,0,w,h);ctx.strokeStyle='var(--p)';ctx.lineWidth=0.5;
for(let i=0;i<12;i++){{ctx.beginPath();ctx.arc(w/2,h/2,100+i*30+Math.sin(t+i)*20,0,Math.PI*2);ctx.stroke();}} requestAnimationFrame(draw);}}draw();
</script></body></html>
